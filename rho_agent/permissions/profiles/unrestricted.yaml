# unrestricted.yaml - Unrestricted profile for sandboxed and autonomous agents
#
# Full access with no approval gates. Intended for use in sandboxed
# environments (containers, Daytona) or autonomous agent loops where
# human approval is not feasible.

profile: unrestricted
description: "Unrestricted profile - full access, no approval gates"

shell:
  mode: unrestricted  # Any command allowed

file_write:
  mode: full  # Full write and edit access

database:
  mode: mutations  # Full database access including INSERT/UPDATE/DELETE

approval:
  mode: none  # No approval required

shell_timeout: 300  # 5 minutes for builds and complex operations
shell_working_dir: /app  # Default working directory in containers
